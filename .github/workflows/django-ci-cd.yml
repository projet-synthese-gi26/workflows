name: Django CI/CD

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      registry_image:
        required: false
        type: string
        default: ""        # sera calculé automatiquement si vide
    secrets:
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false
      PERSONAL_ACCESS_TOKEN:
        required: false
      REGISTRY_NAMESPACE:
        required: false
      SSH_PRIVATE_KEY:
        required: false
      REMOTE_USER:
        required: false
      REMOTE_HOST:
        required: false
      DEPLOY_DELAY:
        required: false

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply Migration
        #continue-on-error: true
        run: |
          python manage.py makemigrations --merge --noinput
          python manage.py migrate

      - name: Run Tests
        #continue-on-error: true
        run: |
          python manage.py test

  build:
    needs: tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.PERSONAL_ACCESS_TOKEN }}" | docker login ghcr.io -u ${{ secrets.REGISTRY_NAMESPACE }} --password-stdin

      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t ${{ env.REGISTRY_IMAGE }}:latest .

      - name: Push Docker image
        run: |
          echo "Pushing Docker image..."
          docker push ${{ env.REGISTRY_IMAGE }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} << 'EOF'

            echo "Pulling latest image ${{ env.REGISTRY_IMAGE }}"

            sudo docker login ghcr.io -u ${{ secrets.REGISTRY_NAMESPACE }} -p ${{ secrets.PERSONAL_ACCESS_TOKEN }}

            cd /home/${{ secrets.REMOTE_USER }}/yowyob/backend

            echo "Stopping fare-calculator services"
            sudo docker compose down fare-calculator-migrate fare-calculator-service celery_worker celery_beat

            echo "Removing old image"
            sudo docker rmi -f ${{ env.REGISTRY_IMAGE }}:latest || true

            echo "Pulling new image"
            sudo docker pull ${{ env.REGISTRY_IMAGE }}:latest

            echo "Starting fare-calculator services"
            sudo docker compose up -d fare-calculator-migrate fare-calculator-service celery_worker celery_beat

            echo "Waiting ${{ env.HEALTH_DELAY }} seconds for health check"
            sleep ${{ env.HEALTH_DELAY }}

            echo "Checking container health..."
            STATUS=$(sudo docker inspect --format='{{json .State.Health.Status}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo '"starting"')

            echo "Health status: $STATUS"

            if [ "$STATUS" != "\"healthy\"" ]; then
              echo "WARNING: Container may still be starting. Showing logs..."
              sudo docker logs ${{ env.CONTAINER_NAME }} --tail 30 || true
              
              # Retry health check
              echo "Waiting 30 more seconds..."
              sleep 30
              STATUS=$(sudo docker inspect --format='{{json .State.Health.Status}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo '"unknown"')
              echo "Final health status: $STATUS"
              
              if [ "$STATUS" != "\"healthy\"" ]; then
                echo "ERROR: Container is not healthy after extended wait"
                sudo docker logs ${{ env.CONTAINER_NAME }} --tail 50 || true
                exit 1
              fi
            fi

            echo "Deployment successful & container healthy!"
          EOF
