name: Spring Boot CI/CD (Generic and Reusable)

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      registry_image:
        required: false
        type: string
        default: ""        # sera calculé automatiquement si vide
      java_version:
        required: false
        type: string
        default: "21"
    secrets:
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false
      PERSONAL_ACCESS_TOKEN:
        required: false
      REGISTRY_NAMESPACE:
        required: false
      SSH_PRIVATE_KEY:
        required: false
      REMOTE_USER:
        required: false
      REMOTE_HOST:
        required: false
      DEPLOY_DELAY:
        required: false

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java_version }}

      - name: Run Unit Tests + SonarQube Analysis
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=${{ inputs.app_name }} \
            -Dsonar.projectName=${{ inputs.app_name }} \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}

  build:
    needs: tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set registry image name
        id: vars
        run: |
          IMAGE="${{ inputs.registry_image }}"
          if [ -z "$IMAGE" ]; then
            IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.app_name }}"
          fi
          echo "registry_image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.PERSONAL_ACCESS_TOKEN }}" | docker login ghcr.io \
            -u ${{ secrets.REGISTRY_NAMESPACE }} --password-stdin

      - name: Use prod application config (if exists)
        run: |
          RESOURCES="src/main/resources"
      
          # Cherche prod.application.yml ou prod.application.properties
          if [ -f "$RESOURCES/prod.application.yml" ]; then
            PROD_FILE="$RESOURCES/prod.application.yml"
            TARGET="$RESOURCES/application.yml"
            # Supprime l'éventuel application.properties concurrent
            rm -f "$RESOURCES/application.properties"
      
          elif [ -f "$RESOURCES/prod.application.properties" ]; then
            PROD_FILE="$RESOURCES/prod.application.properties"
            TARGET="$RESOURCES/application.properties"
            # Supprime l'éventuel application.yml concurrent
            rm -f "$RESOURCES/application.yml"
      
          else
            echo "No prod.application.* file found — keeping existing config as-is"
            exit 0
          fi
      
          echo "Found: $PROD_FILE → replacing $(basename $TARGET)"
          rm -f "$TARGET"
          mv "$PROD_FILE" "$TARGET"
          echo "Active config:"
          cat "$TARGET"

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ steps.vars.outputs.registry_image }}:latest .
          docker push ${{ steps.vars.outputs.registry_image }}:latest

    outputs:
      registry_image: ${{ steps.vars.outputs.registry_image }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy on server
        env:
          REGISTRY_IMAGE: ${{ needs.build.outputs.registry_image }}
          CONTAINER_NAME: ${{ inputs.app_name }}
          HEALTH_DELAY: ${{ secrets.DEPLOY_DELAY }}
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} << EOF
            sudo echo ${{ secrets.PERSONAL_ACCESS_TOKEN }} | docker login ghcr.io -u ${{ secrets.REGISTRY_NAMESPACE }} --password-stdin
            cd /home/${{ secrets.REMOTE_USER }}/yowyob/backend
            sudo docker compose down ${CONTAINER_NAME}
            sudo docker rmi -f ${REGISTRY_IMAGE}:latest || true
            sudo docker pull ${REGISTRY_IMAGE}:latest
            sudo docker compose up -d ${CONTAINER_NAME}
            sleep ${HEALTH_DELAY}
            STATUS=\$(sudo docker inspect --format='{{json .State.Health.Status}}' ${CONTAINER_NAME})
            echo "Health status: \$STATUS"
            if [ "\$STATUS" != '"healthy"' ]; then
              echo "ERROR: Container is not healthy"
              exit 1
            fi
            echo "Deployment successful!"
          EOF
