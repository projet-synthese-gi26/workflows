name: "[GENERIC] Docker Pipeline — Frontend Next.js"

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      registry_image:
        required: false
        type: string
        default: ""
      node_version:
        required: false
        type: string
        default: "20"
      run_lint:
        required: false
        type: boolean
        default: false

    secrets:
      PERSONAL_ACCESS_TOKEN:
        required: true
      REGISTRY_NAMESPACE:
        required: true
      SSH_PRIVATE_KEY:
        required: false
      REMOTE_USER:
        required: false
      REMOTE_HOST:
        required: false
      DEPLOY_DELAY:
        required: false
      # NEXT_PUBLIC_* — toutes optionnelles selon le projet
      NEXT_PUBLIC_API_BASE_URL:
        required: false
      NEXT_PUBLIC_VEHICLE_API_BASE_URL:
        required: false
      NEXT_PUBLIC_OSM_BASE_URL:
        required: false
      NEXT_PUBLIC_COMPLIANCE_URL:
        required: false
      NEXT_PUBLIC_API_AUTH_URL:
        required: false
      NEXT_PUBLIC_API_UGATE_URL:
        required: false
      # Ajouter ici les secrets NEXT_PUBLIC_* des futurs projets

jobs:
  lint:
    name: "Lint & Type Check"
    runs-on: ubuntu-latest
    if: ${{ inputs.run_lint }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Install dependencies
        run: |
          npm install
          npm ci

      - name: Run lint
        continue-on-error: true
        run: npm run lint --if-present

  build-and-push:
    name: "Docker Build & Push"
    runs-on: ubuntu-latest
    needs: [lint]
    # Si lint est skippé (run_lint=false), on lance quand même
    if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}
    outputs:
      registry_image: ${{ steps.vars.outputs.registry_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set registry image name
        id: vars
        run: |
          IMAGE="${{ inputs.registry_image }}"
          if [ -z "$IMAGE" ]; then
            IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.app_name }}"
          fi
          echo "registry_image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.PERSONAL_ACCESS_TOKEN }}" | docker login ghcr.io \
            -u ${{ secrets.REGISTRY_NAMESPACE }} --password-stdin    
            
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.registry_image }}:latest
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_VEHICLE_API_BASE_URL=${{ secrets.NEXT_PUBLIC_VEHICLE_API_BASE_URL }}
            NEXT_PUBLIC_OSM_BASE_URL=${{ secrets.NEXT_PUBLIC_OSM_BASE_URL }}
            NEXT_PUBLIC_COMPLIANCE_URL=${{ secrets.NEXT_PUBLIC_COMPLIANCE_URL }}
            NEXT_PUBLIC_API_AUTH_URL=${{ secrets.NEXT_PUBLIC_API_AUTH_URL }}
            NEXT_PUBLIC_API_UGATE_URL=${{ secrets.NEXT_PUBLIC_API_UGATE_URL }}

  deploy:
    name: "Deploy on server"
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
  
      - name: Deploy on server
        env:
          REGISTRY_IMAGE: ${{ needs.build-and-push.outputs.registry_image }}
          CONTAINER_NAME: ${{ inputs.app_name }}
          HEALTH_DELAY: ${{ secrets.DEPLOY_DELAY }}
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} << EOF
            sudo echo ${{ secrets.PERSONAL_ACCESS_TOKEN }} | docker login ghcr.io -u ${{ secrets.REGISTRY_NAMESPACE }} --password-stdin
            cd /home/${{ secrets.REMOTE_USER }}/yowyob/frontend
            sudo docker compose down ${CONTAINER_NAME}
            sudo docker rmi -f ${REGISTRY_IMAGE}:latest || true
            sudo docker pull ${REGISTRY_IMAGE}:latest
            sudo docker compose up -d ${CONTAINER_NAME}
            sleep ${HEALTH_DELAY}
            STATUS=\$(sudo docker inspect --format='{{json .State.Health.Status}}' ${CONTAINER_NAME})
            echo "Health status: \$STATUS"
            if [ "\$STATUS" != '"healthy"' ]; then
              echo "ERROR: Container is not healthy"
              exit 1
            fi
            echo "Deployment successful!"
          EOF
    
      
