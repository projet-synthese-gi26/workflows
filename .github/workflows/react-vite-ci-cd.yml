# =============================================================
# PIPELINE GÉNÉRIQUE FRONTEND VITE
name: "[GENERIC] Docker Pipeline — Frontend Vite"

on:
  workflow_call:
    # -------------------------------------------------------
    # INPUTS : paramètres configurables par projet
    # -------------------------------------------------------
    inputs:
      app_name:
        required: true
        type: string
      registry_image:
        required: false
        type: string
        default: ""        # sera calculé automatiquement si vide
  
      node_version:
        description: "Version de Node.js pour le lint/typecheck optionnel"
        required: false
        type: string
        default: "20"

      run_lint:
        description: "Activer le lint avant le build Docker"
        required: false
        type: boolean
        default: false
    # -------------------------------------------------------
    # SECRETS : transmis explicitement par le workflow projet
    # -------------------------------------------------------
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true

      # Variables d'environnement Vite (toutes optionnelles
      # selon les besoins du projet)
      VITE_API_BASE_URL:
        required: false
      VITE_API_KEY:
        required: false
      VITE_MAPBOX_TOKEN:
        required: false
      VITE_MAPBOX_STYLE:
        required: false
      VITE_NOMINATIM_BASE_URL:
        required: false
      VITE_OPENMETEO_BASE_URL:
        required: false
      VITE_MODE:
        required: false
      VITE_ENABLE_GEOLOCATION:
        required: false
      VITE_CACHE_TTL:
        required: false
      VITE_API_TIMEOUT:
        required: false
      VITE_GA_ID:
        required: false
      VITE_FIREBASE_API_KEY:
        required: false
      VITE_FIREBASE_AUTH_DOMAIN:
        required: false
      VITE_FIREBASE_PROJECT_ID:
        required: false
      VITE_FIREBASE_STORAGE_BUCKET:
        required: false
      VITE_FIREBASE_MESSAGING_SENDER_ID:
        required: false
      VITE_FIREBASE_APP_ID:
        required: false
      VITE_FIREBASE_BILLING_ENABLED:
        required: false
      # ↑ Ajouter ici de nouveaux secrets VITE_* pour d'autres projets

# =============================================================
jobs:
  # -----------------------------------------------------------
  # JOB 1 (optionnel) : Lint / Type-check
  # Skippé si input.run_lint = false
  # -----------------------------------------------------------
  lint:
    name: "Lint & Type Check"
    runs-on: ubuntu-latest
    if: ${{ inputs.run_lint }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run type check
        run: npm run type-check --if-present

  # -----------------------------------------------------------
  # JOB 2 : Build Docker & Push vers le registry
  # -----------------------------------------------------------
  build-and-push:
    name: "Docker Build & Push"
    runs-on: ubuntu-latest
    needs: [lint]
    # Si lint est skippé (run_lint=false), on lance quand même
    if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}
    outputs:
      registry_image: ${{ steps.vars.outputs.registry_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set registry image name
        id: vars
        run: |
          IMAGE="${{ inputs.registry_image }}"
          if [ -z "$IMAGE" ]; then
            IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.app_name }}"
          fi
          echo "registry_image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.PERSONAL_ACCESS_TOKEN }}" | docker login ghcr.io \
            -u ${{ secrets.REGISTRY_NAMESPACE }} --password-stdin    
      
      # ----- Build & Push avec cache -------------------------
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ steps.vars.outputs.registry_image }}:latest
          # Cache GitHub Actions pour accélérer les builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Injection des VITE_* comme build-args Docker
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_API_KEY=${{ secrets.VITE_API_KEY }}
            VITE_MAPBOX_TOKEN=${{ secrets.VITE_MAPBOX_TOKEN }}
            VITE_MAPBOX_STYLE=${{ secrets.VITE_MAPBOX_STYLE }}
            VITE_NOMINATIM_BASE_URL=${{ secrets.VITE_NOMINATIM_BASE_URL }}
            VITE_OPENMETEO_BASE_URL=${{ secrets.VITE_OPENMETEO_BASE_URL }}
            VITE_MODE=${{ secrets.VITE_MODE }}
            VITE_ENABLE_GEOLOCATION=${{ secrets.VITE_ENABLE_GEOLOCATION }}
            VITE_CACHE_TTL=${{ secrets.VITE_CACHE_TTL }}
            VITE_API_TIMEOUT=${{ secrets.VITE_API_TIMEOUT }}
            VITE_GA_ID=${{ secrets.VITE_GA_ID }}
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
            VITE_FIREBASE_BILLING_ENABLED=${{ secrets.VITE_FIREBASE_BILLING_ENABLED }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
  
      - name: Deploy on server
        env:
          REGISTRY_IMAGE: ${{ needs.build-and-push.outputs.registry_image }}
          CONTAINER_NAME: ${{ inputs.app_name }}
          HEALTH_DELAY: ${{ secrets.DEPLOY_DELAY }}
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} << EOF
            sudo docker login ghcr.io -u ${{ secrets.REGISTRY_NAMESPACE }} \
              -p ${{ secrets.PERSONAL_ACCESS_TOKEN }}
            cd /home/${{ secrets.REMOTE_USER }}/yowyob/frontend
            sudo docker compose down ${CONTAINER_NAME}
            sudo docker rmi -f ${REGISTRY_IMAGE}:latest || true
            sudo docker pull ${REGISTRY_IMAGE}:latest
            sudo docker compose up -d ${CONTAINER_NAME}
            sleep ${HEALTH_DELAY}
            STATUS=\$(sudo docker inspect --format='{{json .State.Health.Status}}' ${CONTAINER_NAME})
            echo "Health status: \$STATUS"
            if [ "\$STATUS" != '"healthy"' ]; then
              echo "ERROR: Container is not healthy"
              exit 1
            fi
            echo "Deployment successful!"
          EOF
